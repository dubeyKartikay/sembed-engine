name: Build and Test

on:
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Debug

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel

    - name: Test
      run: ctest --test-dir ${{github.workspace}}/build --output-on-failure --output-junit ${{github.workspace}}/build/test-report/junit.xml

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: ${{ always() && !cancelled() }}
      with:
        name: test-report
        path: ${{github.workspace}}/build/test-report/junit.xml

    - name: Upload Coverage Report
      uses: dorny/test-reporter@v3
      if: ${{ always() && !cancelled() }}
      with:
        fail-on-error: 'false'
        artifact: test-report
        name: GTest
        path: '*.xml'
        reporter: java-junit

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: asan
          cmake_flag: -DSEMBED_ENABLE_ASAN=ON
        - name: ubsan
          cmake_flag: -DSEMBED_ENABLE_UBSAN=ON
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Configure CMake (${{matrix.name}})
      run: cmake -S . -B ${{github.workspace}}/build-${{matrix.name}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{matrix.cmake_flag}}

    - name: Build (${{matrix.name}})
      run: cmake --build ${{github.workspace}}/build-${{matrix.name}} --config ${{env.BUILD_TYPE}} --parallel

    - name: Test (${{matrix.name}})
      run: ctest --test-dir ${{github.workspace}}/build-${{matrix.name}} --output-on-failure
